<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="description" content="Kotoba Trainer - Latihan kosakata Jepang tanpa kanji" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kotoba" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <link rel="stylesheet" href="style.css" />
  <title>Kotoba Trainer</title>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <h1 class="app-title">言葉 <span>Trainer</span></h1>
      <div class="header-actions">
        <button class="icon-btn" id="btnSearch" title="Cari Kata" aria-label="Cari kata">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" id="btnStats" title="Statistik" aria-label="Statistik">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </button>
      </div>
    </div>
    <div class="progress-section">
      <div class="progress-text">
        <span id="progressCurrent">0</span> / <span id="progressTotal">0</span>
        <span class="progress-label">kata dipelajari</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="streak-row">
        <span class="streak-badge" id="streakBadge">🔥 0</span>
        <span class="accuracy-badge" id="accuracyBadge">✓ 0%</span>
      </div>
    </div>
  </header>

  <!-- ===== SECTION: LATIHAN ===== -->
  <div id="trainSection">
    <div class="controls-row">
      <div class="select-wrap">
        <select id="modeSelect" aria-label="Mode latihan">
          <option value="jp-romaji">JP → Romaji</option>
          <option value="romaji-jp">Romaji → JP</option>
          <option value="jp-indo">JP → Indonesia</option>
          <option value="indo-jp">Indonesia → JP</option>
          <option value="campur">🎲 Campur Semua</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="categorySelect" aria-label="Pilih kategori"></select>
      </div>
    </div>

    <main class="card-area">
      <div class="word-card" id="wordCard">
        <div class="card-top">
          <span class="category-tag" id="categoryTag">—</span>
          <div class="card-actions">
            <button class="icon-btn small" id="btnSpeak" title="Dengarkan" aria-label="Dengarkan">
              <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <button class="icon-btn small" id="btnFav" title="Favorit" aria-label="Tambah favorit">
              <svg viewBox="0 0 24 24" id="favIcon"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
          </div>
        </div>
        <div class="card-question">
          <div class="question-label" id="questionLabel">Apa artinya?</div>
          <div class="question-text" id="questionText">—</div>
          <div class="question-sub" id="questionSub"></div>
        </div>
        <div class="feedback" id="feedback" aria-live="polite">
          <div class="feedback-icon" id="feedbackIcon"></div>
          <div class="feedback-detail" id="feedbackDetail"></div>
        </div>
      </div>
    </main>

    <div class="answer-area">
      <div class="input-wrap">
        <input type="text" id="answerInput" class="answer-input"
          placeholder="Ketik jawaban..."
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          aria-label="Jawaban" />
        <button class="submit-btn" id="btnSubmit">Submit</button>
      </div>
      <div class="hint-text">Enter = submit &nbsp;·&nbsp; Esc = lewati</div>
    </div>
  </div>
  <!-- /#trainSection -->

  <!-- ===== SECTION: SOAL SALAH ===== -->
  <div id="reviewSection"></div>

  <!-- ===== SECTION: FAVORIT ===== -->
  <div id="favsSection"></div>

  <!-- ===== SECTION: SUDAH DIPELAJARI ===== -->
  <div id="learnedSection"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="btnTrain">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Latihan
    </button>
    <button class="nav-btn" id="btnReviewWrong">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Salah
    </button>
    <button class="nav-btn" id="btnFavList">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Favorit
    </button>
    <button class="nav-btn" id="btnLearned">
      <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Dipelajari
    </button>
    <button class="nav-btn" id="btnReset" style="color:var(--red);opacity:0.75">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      Reset
    </button>
  </nav>

</div><!-- /#app -->

<!-- PANEL CARI -->
<div class="panel" id="panelSearch" role="dialog" aria-modal="true" aria-label="Cari kata">
  <div class="panel-header">
    <h2>Cari Kata</h2>
    <button class="icon-btn" id="closeSearch" aria-label="Tutup">✕</button>
  </div>
  <input type="text" id="searchInput" class="search-field" placeholder="Romaji, Indonesia, Hiragana…" aria-label="Cari" />
  <div class="search-results" id="searchResults"></div>
</div>

<!-- PANEL STATISTIK -->
<div class="panel" id="panelStats" role="dialog" aria-modal="true" aria-label="Statistik">
  <div class="panel-header">
    <h2>Statistik</h2>
    <button class="icon-btn" id="closeStats" aria-label="Tutup">✕</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="statCorrect">0</div><div class="stat-label">Benar</div></div>
    <div class="stat-card"><div class="stat-val" id="statWrong">0</div><div class="stat-label">Salah</div></div>
    <div class="stat-card"><div class="stat-val" id="statAccuracy">0%</div><div class="stat-label">Akurasi</div></div>
    <div class="stat-card"><div class="stat-val" id="statStreak">0</div><div class="stat-label">Streak Terbaik</div></div>
    <div class="stat-card wide"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Total Soal Dijawab</div></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>

<script src="data.js"></script>
<script src="script.js"></script>

<!-- PAKSA hapus semua SW lama dan cache lama setiap load -->
<script>
(function() {
  if (!('serviceWorker' in navigator)) return;

  // Unregister semua SW yang tidak aktif / lama
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    var promises = registrations.map(function(reg) {
      return reg.active && reg.active.scriptURL
        ? Promise.resolve()       // biarkan yang aktif, SW baru handle
        : reg.unregister();
    });
    return Promise.all(promises);
  });

  // Hapus semua cache yang namanya bukan versi terbaru
  var CURRENT = 'kotoba-20250719-001';
  if ('caches' in window) {
    caches.keys().then(function(keys) {
      keys.forEach(function(key) {
        if (key.indexOf(CURRENT) === -1) {
          console.log('[App] Hapus cache lama:', key);
          caches.delete(key);
        }
      });
    });
  }

  // Register SW baru
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./service-worker.js')
      .then(function(reg) {
        console.log('[App] SW registered:', reg.scope);
        // Paksa update kalau ada SW baru menunggu
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          newWorker.addEventListener('statechange', function() {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Ada update → reload otomatis
              window.location.reload();
            }
          });
        });
      })
      .catch(function(err) { console.warn('[App] SW error:', err); });
  });
})();
</script>
</body>
</html>
